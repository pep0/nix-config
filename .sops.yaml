# sops-nix configuration. Replace the placeholder age public key below
# with the real one for this machine (generate with `age-keygen` and
# share only the public part — starts with `age1...`).
#
# To add a second machine, add another anchor under `keys:` and append
# it to the `age:` list under `creation_rules`.

keys:
  - &user_pep0 age1placeholderplaceholderplaceholderplaceholderplaceholderplaceholder

creation_rules:
  - path_regex: secrets/[^/]+\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *user_pep0
